services:
  redis-v2-mysql:
    image: mysql:8.4
    container_name: redis-cache-specialization-v2-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: redis_cache_specialization_v2
      MYSQL_USER: redis_v2
      MYSQL_PASSWORD: redis_v2
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot123456"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - redis-v2-mysql-data:/var/lib/mysql

  redis-v2-redis:
    image: redis:7.4
    container_name: redis-cache-specialization-v2-redis
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-v2-redis-data:/data

  redis-v2-k6:
    image: grafana/k6:1.8.0
    profiles: ["benchmark"]
    working_dir: /scripts
    volumes:
      - ./k6:/scripts:ro
    environment:
      BASE_URL: http://host.docker.internal:8090
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: ["run", "/scripts/schedule-read.js"]

volumes:
  redis-v2-mysql-data:
    name: redis-cache-specialization-v2-mysql-data
  redis-v2-redis-data:
    name: redis-cache-specialization-v2-redis-data
