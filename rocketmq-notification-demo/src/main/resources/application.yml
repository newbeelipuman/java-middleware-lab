server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: never
  metrics:
    tags:
      application: rocketmq-notification-demo

spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/rocketmq_notification_demo?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC&allowPublicKeyRetrieval=true&useSSL=false
    username: demo
    password: demo123456
  sql:
    init:
      mode: always

rocketmq:
  name-server: 127.0.0.1:9876
  producer:
    group: appointment-notification-producer
    send-message-timeout: 3000

app:
  rocketmq:
    appointment-topic: appointment-events
    appointment-tag: appointment-created
  elasticsearch:
    url: http://127.0.0.1:9200
    doctor-index: doctors
  search:
    default-page-size: 10
  nacos:
    enabled: true
    server-addr: 127.0.0.1:8848
    group: DEFAULT_GROUP
    service-name: appointment-notification-service
    config-data-id: rocketmq-notification-demo.properties
    instance-ip: 127.0.0.1
  sentinel:
    enabled: true
    appointment-create-qps: 2
    doctor-search-qps: 3
  xxl-job:
    enabled: false
    admin-addresses: http://127.0.0.1:8080/xxl-job-admin
    app-name: appointment-notification-executor
    ip: 127.0.0.1
    port: 9999
    access-token:
    log-path: logs/xxl-job
    log-retention-days: 7
