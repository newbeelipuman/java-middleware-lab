services:
  mysql:
    image: mysql:8.4
    container_name: rocketmq-notification-mysql
    ports:
      - "3306:3306"
    environment:
      - MYSQL_DATABASE=rocketmq_notification_demo
      - MYSQL_USER=demo
      - MYSQL_PASSWORD=demo123456
      - MYSQL_ROOT_PASSWORD=root123456
    command: ["mysqld", "--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - rocketmq

  namesrv:
    image: apache/rocketmq:5.3.2
    container_name: rocketmq-notification-namesrv
    ports:
      - "9876:9876"
    command: sh mqnamesrv
    networks:
      - rocketmq

  broker:
    image: apache/rocketmq:5.3.2
    container_name: rocketmq-notification-broker
    depends_on:
      - namesrv
    ports:
      - "10909:10909"
      - "10911:10911"
      - "10912:10912"
    environment:
      - NAMESRV_ADDR=namesrv:9876
    volumes:
      - ./broker.conf:/home/rocketmq/rocketmq-5.3.2/conf/broker.conf
    command: sh mqbroker -c /home/rocketmq/rocketmq-5.3.2/conf/broker.conf
    networks:
      - rocketmq

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    container_name: rocketmq-notification-elasticsearch
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    networks:
      - rocketmq

  nacos:
    image: nacos/nacos-server:v2.4.3
    container_name: rocketmq-notification-nacos
    ports:
      - "8848:8848"
      - "9848:9848"
    environment:
      - MODE=standalone
      - NACOS_AUTH_ENABLE=false
      - JVM_XMS=256m
      - JVM_XMX=256m
      - JVM_XMN=128m
    networks:
      - rocketmq

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: rocketmq-notification-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - rocketmq

  grafana:
    image: grafana/grafana:11.3.1
    container_name: rocketmq-notification-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - rocketmq

networks:
  rocketmq:
    driver: bridge

volumes:
  mysql-data:
  elasticsearch-data:
  grafana-data:
